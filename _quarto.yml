  page-navigation: true
  search: true
  navbar:
    background: "#0f2d46"
    foreground: "#f5f1e8"
    left:
      - href: index.qmd
        text: Home
      - href: "Project Plan Team 2.md"
        text: Project Plan
      - href: README.md
        text: Repo Guide
  sidebar:
    style: "docked"
    collapse-level: 1
    search: true
    contents:
      - section: "Overview"
        contents:
          - index.qmd
          - README.md
          - "Project Plan Team 2.md"
      - section: "Lessons"
        contents:
          - lessons/00-data-analysis-big-picture-lesson-plan.md
          - lessons/00-data-analysis-big-picture-tutorial.md
          - lessons/00-data-analysis-big-picture-assignment.md
          - lessons/01-jupyter-notebooks-foundations-lesson-plan.md
