          - lessons/02-extreme-heat-events-lesson-plan.md
          - lessons/02-extreme-heat-events-tutorial.md
      - section: "Student And Teacher Resources"
        contents:
          - references/student-teacher-manual.md
          - references/dataset-links.md
          - references/expectations-compliance.md
          - references/pact-framework.md
      - section: "Selected Notebooks"
        contents:
          - notebooks/csv/02-extreme-heat-events-exploration.ipynb
          - notebooks/csv/temperature-change-seasonal-exploration.ipynb
          - notebooks/csv/ghg-emissions-projections-exploration.ipynb

